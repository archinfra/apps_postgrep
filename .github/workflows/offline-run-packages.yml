name: offline-run-packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package directory, for example apps_postgre"
        required: true
        default: "apps_postgre"
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Login source registry
        if: ${{ vars.SOURCE_REGISTRY != '' && secrets.SOURCE_REGISTRY_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.SOURCE_REGISTRY }}
          username: ${{ secrets.SOURCE_REGISTRY_USERNAME }}
          password: ${{ secrets.SOURCE_REGISTRY_PASSWORD }}

      - name: Build offline package
        shell: bash
        run: |
          PKG="${{ github.event.inputs.package || 'apps_postgre' }}"
          cd "$PKG"
          bash -n build.sh install.sh
          jq empty images/image.json
          bash build.sh --arch "${{ matrix.arch }}"
          ls -lh dist/
          sha256sum -c dist/*.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: offline-run-${{ matrix.arch }}
          path: |
            ${{ github.event.inputs.package || 'apps_postgre' }}/dist/*.run
            ${{ github.event.inputs.package || 'apps_postgre' }}/dist/*.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*

apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgre.fullname" . }}
  labels:
    {{- include "postgre.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: postgresql
      port: {{ .Values.service.port }}
      targetPort: postgresql
  selector:
    {{- include "postgre.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgre.fullname" . }}-headless
  labels:
    {{- include "postgre.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: postgresql
      port: {{ .Values.service.port }}
      targetPort: postgresql
  selector:
    {{- include "postgre.selectorLabels" . | nindent 4 }}
